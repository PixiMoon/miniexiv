name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            artifact: Linux

          - name: macOS
            os: macos-latest
            artifact: macOS

          - name: Windows
            os: windows-latest
            artifact: Windows

    runs-on: ${{ matrix.os }}

    steps:
      # ------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------------
      # Verify release tag and files
      # ------------------------------------------------------------
      - name: Check source files
        shell: bash
        run: |
          echo "Release tag: ${GITHUB_REF_NAME}"
          echo "Repository files:"
          ls -la

          test -f CMakeLists.txt
          test -f README.md
          test -f LICENSE

      # ------------------------------------------------------------
      # Linux dependencies
      # ------------------------------------------------------------
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libexiv2-dev \
            rpm

      # ------------------------------------------------------------
      # macOS dependencies
      # ------------------------------------------------------------
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew update
          brew install \
            cmake \
            ninja \
            pkg-config \
            exiv2

      # ------------------------------------------------------------
      # Windows dependencies
      # ------------------------------------------------------------
      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install cmake ninja -y --no-progress

          if (!(Test-Path "C:\vcpkg\vcpkg.exe")) {
            if (!(Test-Path "C:\vcpkg")) {
              git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
            }

            & C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          }

          if (!(Test-Path "${{ github.workspace }}\vcpkg.json")) {
            throw "vcpkg.json was not found in the repository."
          }

          & C:\vcpkg\vcpkg.exe install `
            --x-manifest-root="${{ github.workspace }}" `
            --triplet=x64-windows

      # ------------------------------------------------------------
      # Configure
      # ------------------------------------------------------------
      - name: Configure (Linux and macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_TESTING=ON \
            -DBUILD_DOCS=OFF

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=ON `
            -DBUILD_TESTING=ON `
            -DBUILD_DOCS=OFF `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      # ------------------------------------------------------------
      # Build
      # ------------------------------------------------------------
      - name: Build
        shell: bash
        run: |
          cmake --build build --config Release

      # ------------------------------------------------------------
      # Tests
      # ------------------------------------------------------------
      - name: Run tests
        shell: bash
        run: |
          ctest \
            --test-dir build \
            --build-config Release \
            --output-on-failure

      # ------------------------------------------------------------
      # Binary packages
      # ------------------------------------------------------------
      - name: Create binary packages
        shell: bash
        working-directory: build
        run: |
          cpack \
            --config CPackConfig.cmake \
            -C Release

      # ------------------------------------------------------------
      # Source package
      # Create it only once to avoid duplicate source archives.
      # ------------------------------------------------------------
      - name: Create source packages
        if: runner.os == 'Linux'
        shell: bash
        working-directory: build
        run: |
          cpack \
            --config CPackSourceConfig.cmake

      # ------------------------------------------------------------
      # Package checksums
      # ------------------------------------------------------------
      - name: Create checksums
        shell: bash
        run: |
          find build -maxdepth 1 -type f \
            \( -name "*.tar.gz" \
            -o -name "*.zip" \
            -o -name "*.deb" \
            -o -name "*.rpm" \) \
            -print0 |
          while IFS= read -r -d '' file; do
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$file" > "$file.sha256"
            else
              shasum -a 256 "$file" > "$file.sha256"
            fi
          done

      # ------------------------------------------------------------
      # Show generated packages
      # ------------------------------------------------------------
      - name: List packages
        shell: bash
        run: |
          echo "Generated packages:"
          find . -maxdepth 2 -type f \
            \( -name "*.tar.gz" \
            -o -name "*.zip" \
            -o -name "*.deb" \
            -o -name "*.rpm" \
            -o -name "*.sha256" \) \
            -print

      # ------------------------------------------------------------
      # Upload workflow artifacts
      # ------------------------------------------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: miniexiv-${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 14
          path: |
            build/*.tar.gz
            build/*.zip
            build/*.deb
            build/*.rpm
            build/*.sha256

  # ==================================================================
  # GitHub Release
  # ==================================================================
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List release files
        shell: bash
        run: |
          find artifacts -type f -print

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.sha256
